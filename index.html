<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GaVang Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📚 GaVang Quiz</h1>

    <div id="menu">
        <h2>Chọn môn học</h2>

        <button onclick="chooseSubject('toan')">Toán</button>
        <button onclick="chooseSubject('tieng_viet')">Tiếng Việt</button>
        <button onclick="chooseSubject('khoa_hoc')">Khoa học</button>
        <button onclick="chooseSubject('lich_su')">Lịch sử</button>
        <div id="gradeArea"></div>
    </div>

    <div id="quiz" style="display:none;">
        <div id="progress"></div>

        <h2 id="question"></h2>

        <div class="answers">
            <button class="answerBtn"></button>
            <button class="answerBtn"></button>
            <button class="answerBtn"></button>
            <button class="answerBtn"></button>
        </div>

        <div id="result"></div>
    </div>

</div>

<script src="script.js"></script>
<script>
if ('caches' in window) {
  caches.keys().then(names => {
    names.forEach(name => caches.delete(name));
  });
}
</script>
</body>
</html>
